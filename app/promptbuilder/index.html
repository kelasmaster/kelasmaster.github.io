<!DOCTYPE html>
<html lang="id" x-data="promptApp()" :class="{ 'dark': darkMode === 'dark' || (darkMode === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches) }" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Prompt Builder - Pembuat Prompt Aplikasi Profesional</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f5f3ff',
              100: '#ede9fe',
              200: '#ddd6fe',
              500: '#8b5cf6',
              600: '#7c3aed',
              700: '#6d28d9',
              800: '#5b21b6',
              900: '#4c1d95',
            }
          },
          fontFamily: {
            sans: ['Inter', 'Plus Jakarta Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Alpine.js & Lucide Icons -->
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(156, 163, 175, 0.3);
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(156, 163, 175, 0.5);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen transition-colors duration-300">

  <!-- TOAST NOTIFICATIONS -->
  <div class="fixed top-5 right-5 z-50 flex flex-col gap-3 pointer-events-none">
    <template x-for="toast in toasts" :key="toast.id">
      <div x-transition:enter="transition ease-out duration-300 transform"
           x-transition:enter-start="opacity-0 translate-y-2 md:translate-y-0 md:translate-x-4"
           x-transition:enter-end="opacity-100 translate-y-0 md:translate-x-0"
           x-transition:leave="transition ease-in duration-200"
           x-transition:leave-start="opacity-100"
           x-transition:leave-end="opacity-0"
           class="pointer-events-auto flex items-center gap-3 bg-white dark:bg-slate-900 shadow-xl border border-slate-100 dark:border-slate-800 px-4 py-3.5 rounded-2xl max-w-sm">
        <div class="p-1.5 rounded-xl text-white" :class="toast.type === 'success' ? 'bg-emerald-500' : toast.type === 'info' ? 'bg-indigo-500' : 'bg-rose-500'">
          <i :data-lucide="toast.type === 'success' ? 'check-circle' : toast.type === 'info' ? 'info' : 'alert-circle'" class="w-4 h-4"></i>
        </div>
        <p class="text-xs font-semibold" x-text="toast.message"></p>
      </div>
    </template>
  </div>

  <!-- MAIN APP CONTAINER -->
  <div class="flex min-h-screen h-screen overflow-hidden">
    
    <!-- DESKTOP SIDEBAR -->
    <aside class="hidden lg:flex flex-col w-72 bg-white dark:bg-slate-900 border-r border-slate-100 dark:border-slate-800 shrink-0">
      <div class="p-6 flex items-center gap-3 border-b border-slate-100 dark:border-slate-800">
        <div class="p-2.5 bg-brand-600 text-white rounded-2xl shadow-lg shadow-brand-500/20">
          <i data-lucide="cpu" class="w-6 h-6 animate-pulse"></i>
        </div>
        <div>
          <h1 class="font-extrabold text-md bg-gradient-to-r from-brand-600 to-indigo-500 bg-clip-text text-transparent">App Prompt Builder</h1>
          <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">SaaS Professional</span>
        </div>
      </div>
      
      <!-- NAVIGATION LINKS -->
      <nav class="flex-1 p-4 space-y-2 overflow-y-auto custom-scrollbar">
        <button @click="activeTab = 'dashboard'" :class="activeTab === 'dashboard' ? 'bg-brand-50 text-brand-700 dark:bg-brand-950/40 dark:text-brand-300' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50'" class="w-full flex items-center gap-3.5 px-4 py-3 rounded-2xl text-sm font-bold transition">
          <i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard
        </button>
        <button @click="activeTab = 'builder'" :class="activeTab === 'builder' ? 'bg-brand-50 text-brand-700 dark:bg-brand-950/40 dark:text-brand-300' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50'" class="w-full flex items-center gap-3.5 px-4 py-3 rounded-2xl text-sm font-bold transition">
          <i data-lucide="sliders" class="w-5 h-5"></i> Prompt Wizard
        </button>
        <button @click="activeTab = 'templates'" :class="activeTab === 'templates' ? 'bg-brand-50 text-brand-700 dark:bg-brand-950/40 dark:text-brand-300' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50'" class="w-full flex items-center gap-3.5 px-4 py-3 rounded-2xl text-sm font-bold transition">
          <i data-lucide="book-open" class="w-5 h-5"></i> Template Bawaan
        </button>
        <button @click="activeTab = 'settings'" :class="activeTab === 'settings' ? 'bg-brand-50 text-brand-700 dark:bg-brand-950/40 dark:text-brand-300' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50'" class="w-full flex items-center gap-3.5 px-4 py-3 rounded-2xl text-sm font-bold transition">
          <i data-lucide="settings" class="w-5 h-5"></i> Pengaturan
        </button>
      </nav>

      <!-- SIDEBAR FOOTER & SYSTEM THEME -->
      <div class="p-4 border-t border-slate-100 dark:border-slate-800 space-y-2">
        <div class="flex items-center justify-between p-2.5 bg-slate-50 dark:bg-slate-800/50 rounded-2xl">
          <span class="text-xs font-bold text-slate-400">Mode Tampilan</span>
          <div class="flex gap-1 bg-white dark:bg-slate-900 p-1 rounded-xl shadow-inner">
            <button @click="setTheme('light')" :class="darkMode === 'light' ? 'bg-brand-500 text-white' : 'text-slate-400'" class="p-1.5 rounded-lg transition" title="Light Mode">
              <i data-lucide="sun" class="w-3.5 h-3.5"></i>
            </button>
            <button @click="setTheme('dark')" :class="darkMode === 'dark' ? 'bg-brand-500 text-white' : 'text-slate-400'" class="p-1.5 rounded-lg transition" title="Dark Mode">
              <i data-lucide="moon" class="w-3.5 h-3.5"></i>
            </button>
            <button @click="setTheme('auto')" :class="darkMode === 'auto' ? 'bg-brand-500 text-white' : 'text-slate-400'" class="p-1.5 rounded-lg transition" title="Auto (System)">
              <i data-lucide="laptop" class="w-3.5 h-3.5"></i>
            </button>
          </div>
        </div>
      </div>
    </aside>

    <!-- CONTENT BODY CONTAINER -->
    <main class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden relative">
      
      <!-- DESKTOP & MOBILE HEADER -->
      <header class="flex items-center justify-between px-6 py-4 bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800 shrink-0 z-10 shadow-sm">
        <div class="flex items-center gap-3">
          <div class="lg:hidden p-2 bg-brand-600 text-white rounded-xl shadow-md">
            <i data-lucide="cpu" class="w-5 h-5"></i>
          </div>
          <div>
            <h2 class="text-base font-extrabold text-slate-800 dark:text-white uppercase tracking-wider" x-text="activeTab === 'builder' ? 'Langkah ' + currentStep + ' / 20' : activeTab"></h2>
            <p class="text-[10px] text-slate-400 font-bold" x-text="activeTab === 'builder' ? stepTitles[currentStep - 1] : 'SaaS Prompt Management'"></p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <div class="hidden md:flex flex-col items-end">
            <span class="text-xs font-black text-slate-800 dark:text-slate-200">Arsitek AI</span>
            <span class="text-[10px] text-emerald-500 font-bold flex items-center gap-1">
              <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Mode Aktif
            </span>
          </div>
          <div class="w-10 h-10 rounded-2xl bg-gradient-to-tr from-brand-600 to-indigo-600 flex items-center justify-center text-white font-black text-sm shadow-md">
            AI
          </div>
        </div>
      </header>

      <!-- MAIN SCROLLABLE WRAPPER -->
      <div class="flex-1 overflow-y-auto p-4 md:p-8 pb-28 md:pb-8 custom-scrollbar">
        
        <!-- SKELETON LOADER -->
        <div x-show="loading" class="space-y-6">
          <div class="h-6 bg-slate-200 dark:bg-slate-800 rounded-lg w-1/4 animate-pulse"></div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="h-32 bg-slate-200 dark:bg-slate-800 rounded-3xl animate-pulse"></div>
            <div class="h-32 bg-slate-200 dark:bg-slate-800 rounded-3xl animate-pulse"></div>
            <div class="h-32 bg-slate-200 dark:bg-slate-800 rounded-3xl animate-pulse"></div>
          </div>
          <div class="h-80 bg-slate-200 dark:bg-slate-800 rounded-3xl animate-pulse"></div>
        </div>

        <div x-show="!loading" x-transition class="space-y-6">
          
          <!-- ==================== DASHBOARD TAB ==================== -->
          <template x-if="activeTab === 'dashboard'">
            <div class="space-y-6">
              
              <!-- TOP BANNER -->
              <div class="bg-gradient-to-r from-brand-800 to-indigo-900 rounded-3xl p-6 md:p-8 text-white shadow-xl relative overflow-hidden">
                <div class="absolute right-0 bottom-0 opacity-10 transform translate-x-12 translate-y-12">
                  <i data-lucide="cpu" class="w-72 h-72"></i>
                </div>
                <div class="max-w-2xl relative z-10 space-y-4">
                  <span class="bg-brand-500 text-[10px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider shadow-sm">AI Engine Powered</span>
                  <h3 class="text-xl md:text-3xl font-extrabold leading-tight">Buat Prompt Pengembangan Aplikasi Tanpa Cacat</h3>
                  <p class="text-xs md:text-sm text-slate-200 leading-relaxed">
                    Pandu AI kesayangan Anda (ChatGPT, Gemini, Claude, Grok, DeepSeek) dengan instruksi arsitektur sistem modular terlengkap. Bebas bug dan halusinasi.
                  </p>
                  <button @click="startNewPrompt()" class="bg-white text-brand-800 font-extrabold px-5 py-3 rounded-2xl hover:bg-slate-100 transition shadow-lg text-xs md:text-sm flex items-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i> Buat Prompt Baru
                  </button>
                </div>
              </div>

              <!-- METRICS CARDS -->
              <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm flex items-center gap-4">
                  <div class="p-3 bg-brand-50 dark:bg-brand-950 text-brand-600 dark:text-brand-400 rounded-2xl">
                    <i data-lucide="file-text" class="w-6 h-6"></i>
                  </div>
                  <div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Total Prompt</span>
                    <p class="text-xl font-extrabold" x-text="savedPrompts.length"></p>
                  </div>
                </div>

                <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm flex items-center gap-4">
                  <div class="p-3 bg-rose-50 dark:bg-rose-950 text-rose-500 rounded-2xl">
                    <i data-lucide="heart" class="w-6 h-6"></i>
                  </div>
                  <div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Favorit</span>
                    <p class="text-xl font-extrabold" x-text="getFavCount()"></p>
                  </div>
                </div>

                <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm flex items-center gap-4 col-span-2 sm:col-span-1">
                  <div class="p-3 bg-amber-50 dark:bg-amber-950 text-amber-500 rounded-2xl">
                    <i data-lucide="clock" class="w-6 h-6"></i>
                  </div>
                  <div class="min-w-0">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">Prompt Terakhir</span>
                    <p class="text-xs font-bold truncate text-slate-700 dark:text-slate-300" x-text="savedPrompts.length > 0 ? savedPrompts[0].appName : '-'"></p>
                  </div>
                </div>

                <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm flex items-center gap-4 col-span-2 sm:col-span-1">
                  <div class="p-3 bg-indigo-50 dark:bg-indigo-950 text-indigo-500 rounded-2xl">
                    <i data-lucide="package" class="w-6 h-6"></i>
                  </div>
                  <div class="min-w-0">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">Template Terakhir</span>
                    <p class="text-xs font-bold truncate text-slate-700 dark:text-slate-300" x-text="lastTemplateUsed || '-'"></p>
                  </div>
                </div>
              </div>

              <!-- RECENT HISTORY & TEMPLATES LIST -->
              <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                
                <!-- PROMPT HISTORY -->
                <div class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-3xl p-6 space-y-4">
                  <div class="flex items-center justify-between border-b border-slate-100 dark:border-slate-800 pb-3">
                    <h4 class="font-bold text-sm flex items-center gap-2">
                      <i data-lucide="history" class="w-4 h-4 text-brand-600"></i> Prompt Tersimpan Anda
                    </h4>
                    <span class="text-[10px] font-black text-slate-400" x-text="savedPrompts.length + ' Item'"></span>
                  </div>

                  <div class="space-y-3 max-h-80 overflow-y-auto pr-2 custom-scrollbar">
                    <template x-if="savedPrompts.length === 0">
                      <div class="text-center py-12 text-slate-400 space-y-3">
                        <i data-lucide="folder-archive" class="w-12 h-12 mx-auto stroke-1"></i>
                        <p class="text-xs font-bold">Belum ada prompt tersimpan. Mulai membuat prompt pertamamu!</p>
                      </div>
                    </template>
                    
                    <template x-for="item in savedPrompts" :key="item.id">
                      <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-800/40 rounded-2xl border border-slate-100 dark:border-slate-800 hover:shadow-sm transition">
                        <div class="min-w-0 flex-1">
                          <div class="flex items-center gap-2">
                            <span class="text-[10px] font-black uppercase text-brand-600 dark:text-brand-400" x-text="item.platform"></span>
                            <span class="w-1.5 h-1.5 rounded-full bg-slate-300"></span>
                            <span class="text-[9px] font-bold text-slate-400" x-text="item.date"></span>
                          </div>
                          <h5 class="text-xs font-bold text-slate-800 dark:text-slate-200 mt-1 truncate" x-text="item.appName"></h5>
                        </div>
                        <div class="flex items-center gap-1.5 shrink-0 ml-3">
                          <button @click="toggleFavorite(item.id)" class="p-2 rounded-xl text-slate-400 hover:text-rose-500 transition">
                            <i data-lucide="heart" class="w-4 h-4" :class="item.fav ? 'fill-rose-500 text-rose-500' : ''"></i>
                          </button>
                          <button @click="loadPrompt(item)" class="p-2 bg-brand-50 hover:bg-brand-100 text-brand-700 dark:bg-brand-950 dark:text-brand-300 rounded-xl transition text-[10px] font-extrabold flex items-center gap-1">
                            <i data-lucide="external-link" class="w-3 h-3"></i> Buka
                          </button>
                          <button @click="deletePrompt(item.id)" class="p-2 text-slate-400 hover:text-rose-500 transition">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                          </button>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>

                <!-- ACCORDION / AI EDUCATION SECTION -->
                <div class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-3xl p-6 space-y-4">
                  <div class="border-b border-slate-100 dark:border-slate-800 pb-3">
                    <h4 class="font-bold text-sm flex items-center gap-2">
                      <i data-lucide="lightbulb" class="w-4 h-4 text-amber-500 animate-bounce"></i> Mengapa Gunakan Prompt Ber-Struktur?
                    </h4>
                  </div>
                  
                  <div class="space-y-3">
                    <!-- ACCORDION ITEM 1 -->
                    <div class="border border-slate-100 dark:border-slate-800 rounded-2xl overflow-hidden">
                      <button @click="accordionOpen = accordionOpen === 1 ? 0 : 1" class="w-full flex items-center justify-between p-4 bg-slate-50/50 dark:bg-slate-800/20 text-left">
                        <span class="text-xs font-extrabold">1. Menghindari Token Terpotong</span>
                        <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 transition" :class="accordionOpen === 1 ? 'transform rotate-180' : ''"></i>
                      </button>
                      <div x-show="accordionOpen === 1" class="p-4 bg-white dark:bg-slate-900 text-xs text-slate-400 leading-relaxed border-t border-slate-100 dark:border-slate-800">
                        Sering kali AI memotong jawaban karena konteks awal aplikasi tidak jelas. Dengan menyusun arsitektur sistem secara detail terlebih dahulu di form wizard, AI dapat langsung menentukan file-file boilerplate dengan tepat dan ringkas.
                      </div>
                    </div>

                    <!-- ACCORDION ITEM 2 -->
                    <div class="border border-slate-100 dark:border-slate-800 rounded-2xl overflow-hidden">
                      <button @click="accordionOpen = accordionOpen === 2 ? 0 : 2" class="w-full flex items-center justify-between p-4 bg-slate-50/50 dark:bg-slate-800/20 text-left">
                        <span class="text-xs font-extrabold">2. Keamanan & Performa Terjamin</span>
                        <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 transition" :class="accordionOpen === 2 ? 'transform rotate-180' : ''"></i>
                      </button>
                      <div x-show="accordionOpen === 2" class="p-4 bg-white dark:bg-slate-900 text-xs text-slate-400 leading-relaxed border-t border-slate-100 dark:border-slate-800">
                        AI dilatih untuk memprioritaskan keamanan jika diminta. Langkah Keamanan &amp; Performa memastikan AI menambahkan filter Anti-SQL Injection, CSRF, validasi, dan caching sejak baris kode pertama.
                      </div>
                    </div>

                    <!-- ACCORDION ITEM 3 -->
                    <div class="border border-slate-100 dark:border-slate-800 rounded-2xl overflow-hidden">
                      <button @click="accordionOpen = accordionOpen === 3 ? 0 : 3" class="w-full flex items-center justify-between p-4 bg-slate-50/50 dark:bg-slate-800/20 text-left">
                        <span class="text-xs font-extrabold">3. Spesialist Google Apps Script</span>
                        <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 transition" :class="accordionOpen === 3 ? 'transform rotate-180' : ''"></i>
                      </button>
                      <div x-show="accordionOpen === 3" class="p-4 bg-white dark:bg-slate-900 text-xs text-slate-400 leading-relaxed border-t border-slate-100 dark:border-slate-800">
                        Google Apps Script memiliki batasan file (.html dan .gs). Template prompt khusus GAS memfokuskan model AI untuk menulis implementasi server-side dan client-side tanpa dependensi library eksternal yang melanggar batasan eksekusi cloud.
                      </div>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </template>

          <!-- ==================== PROMPT BUILDER (WIZARD) TAB ==================== -->
          <template x-if="activeTab === 'builder'">
            <div class="max-w-4xl mx-auto space-y-6">
              
              <!-- PROGRESS TRACKER -->
              <div class="bg-white dark:bg-slate-900 p-4 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-3">
                <div class="flex items-center gap-2">
                  <span class="text-xs font-black bg-brand-500 text-white w-6 h-6 rounded-lg flex items-center justify-center" x-text="currentStep"></span>
                  <div>
                    <h5 class="text-xs font-extrabold text-slate-800 dark:text-slate-100" x-text="stepTitles[currentStep-1]"></h5>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">Langkah Bertahap Aplikasi</p>
                  </div>
                </div>
                <div class="flex-1 max-w-md hidden md:block">
                  <div class="w-full bg-slate-100 dark:bg-slate-800 h-2.5 rounded-full overflow-hidden">
                    <div class="bg-gradient-to-r from-brand-500 to-indigo-500 h-full transition-all duration-300" :style="'width: ' + ((currentStep / 20) * 100) + '%'"></div>
                  </div>
                </div>
                <span class="text-xs font-extrabold text-brand-600 dark:text-brand-400 shrink-0 text-right" x-text="Math.round((currentStep / 20) * 100) + '% Selesai'"></span>
              </div>

              <!-- STEP CARDS -->
              <div class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm p-6 md:p-8 space-y-6">
                
                <!-- LANGKAH 1: PILIH PLATFORM -->
                <div x-show="currentStep === 1" class="space-y-4">
                  <div class="space-y-1">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest block">Langkah 1: Landasan Utama (Platform / Framework)</label>
                    <p class="text-[11px] text-slate-400 leading-relaxed">Tentukan teknologi utama di mana aplikasi ini akan di-compile atau dijalankan.</p>
                  </div>
                  <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <template x-for="plat in techPlatforms" :key="plat">
                      <button @click="form.platform = plat; if(plat === 'Google App Script') { form.database = 'Spreadsheet' }" 
                              :class="form.platform === plat ? 'border-brand-500 bg-brand-50/50 dark:bg-brand-950/20 text-brand-700 dark:text-brand-300' : 'border-slate-100 dark:border-slate-800 hover:border-slate-200'" 
                              class="p-4 border rounded-2xl text-left font-bold text-xs transition flex justify-between items-center">
                        <span x-text="plat"></span>
                        <span x-show="form.platform === plat" class="w-2.5 h-2.5 rounded-full bg-brand-500"></span>
                      </button>
                    </template>
                  </div>
                </div>

                <!-- LANGKAH 2: JENIS APLIKASI -->
                <div x-show="currentStep === 2" class="space-y-4">
                  <div class="space-y-1">

          { name: 'Sistem Akademik Kampus', tech: 'Vue', database: 'MySQL', desc: 'Portal KRS mahasiswa, nilai semester akademik, absen dosen, dan kualifikasi cetak transkrip.', data: { appName: 'Sistem Akademik Cerdas Mandiri', platform: 'Vue', appType: 'Sistem Akademik', database: 'MySQL', authMethod: 'Username Password', roles: ['Super Admin', 'Admin', 'Member'], dashboard: ['Statistik', 'Kalender', 'Notifikasi'], crud: ['Tambah', 'Edit', 'Hapus', 'Detail', 'Export PDF', 'Print'], search: ['Search', 'Filter', 'Sorting', 'Advanced Search'] } }
        ],

        init() {
          // Load Saved Prompts from Storage
          const stored = localStorage.getItem('prompt_builder_saved');
          if (stored) {
            this.savedPrompts = JSON.parse(stored);
          } else {
            this.savedPrompts = [];
          }

          // Load Builder Settings
          const storedSettings = localStorage.getItem('prompt_builder_settings');
          if (storedSettings) {
            this.settings = JSON.parse(storedSettings);
            this.form.platform = this.settings.defaultPlatform;
            this.form.targetAI = this.settings.defaultAI;
            this.form.detailLevel = this.settings.defaultDetail;
          }

          // Load Template Tracker
          this.lastTemplateUsed = localStorage.getItem('last_template_used') || '';

          this.$watch('activeTab', () => {
            this.loading = true;
            setTimeout(() => {
              this.loading = false;
              this.$nextTick(() => { lucide.createIcons(); });
            }, 300);
          });

          this.$nextTick(() => { lucide.createIcons(); });
        },

        setTheme(theme) {
          this.darkMode = theme;
          localStorage.setItem('darkMode', theme);
          this.addToast(`Tema diatur ke: ${theme}`, 'info');
        },

        addToast(message, type = 'success') {
          const id = Date.now();
          this.toasts.push({ id, message, type });
          this.$nextTick(() => { lucide.createIcons(); });
          setTimeout(() => {
            this.toasts = this.toasts.filter(t => t.id !== id);
          }, 4000);
        },

        getFavCount() {
          return this.savedPrompts.filter(item => item.fav).length;
        },

        startNewPrompt() {
          this.currentStep = 1;
          this.activeTab = 'builder';
        },

        prevStep() {
          if (this.currentStep > 1) {
            this.currentStep--;
          }
        },

        nextStep() {
          if (this.currentStep < 20) {
            this.currentStep++;
            // Skip GAS step if platform is not GAS
            if (this.currentStep === 3 && this.form.platform !== 'Google App Script') {
              this.currentStep++;
            }
          } else {
            this.compileSystemPrompt();
            this.activeTab = 'output';
          }
        },

        toggleFavorite(id) {
          const item = this.savedPrompts.find(p => p.id === id);
          if (item) {
            item.fav = !item.fav;
            localStorage.setItem('prompt_builder_saved', JSON.stringify(this.savedPrompts));
            this.addToast(item.fav ? 'Ditambahkan ke favorit!' : 'Dihapus dari favorit!');
          }
        },

        deletePrompt(id) {
          this.savedPrompts = this.savedPrompts.filter(p => p.id !== id);
          localStorage.setItem('prompt_builder_saved', JSON.stringify(this.savedPrompts));
          this.addToast('Prompt berhasil dihapus', 'error');
        },

        loadPrompt(item) {
          this.form = JSON.parse(JSON.stringify(item.form));
          this.compileSystemPrompt();
          this.activeTab = 'output';
          this.addToast(`Memuat draf: ${item.appName}`);
        },

        applyStaticTemplate(tpl) {
          // Merge template data into current form state
          this.form = Object.assign({}, this.form, tpl.data);
          this.lastTemplateUsed = tpl.name;
          localStorage.setItem('last_template_used', tpl.name);
          
          this.compileSystemPrompt();
          this.activeTab = 'output';
          this.addToast(`Template "${tpl.name}" Berhasil Diaplikasikan!`);
        },

        saveAsCustomTemplate() {
          const newPrompt = {
            id: Date.now(),
            appName: this.form.appName || 'Aplikasi Tanpa Nama',
            platform: this.form.platform,
            date: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }),
            fav: false,
            form: JSON.parse(JSON.stringify(this.form))
          };
          this.savedPrompts.unshift(newPrompt);
          localStorage.setItem('prompt_builder_saved', JSON.stringify(this.savedPrompts));
          this.addToast('Prompt disimpan ke database lokal!');
        },

        saveBuilderSettings() {
          localStorage.setItem('prompt_builder_settings', JSON.stringify(this.settings));
          this.form.platform = this.settings.defaultPlatform;
          this.form.targetAI = this.settings.defaultAI;
          this.form.detailLevel = this.settings.defaultDetail;
          this.addToast('Default builder diperbarui!', 'success');
        },

        copyPromptToClipboard() {
          // Fallback clipboard logic to comply with iframe restrictions
          const textarea = document.createElement('textarea');
          textarea.value = this.generatedPrompt;
          document.body.appendChild(textarea);
          textarea.select();
          try {
            document.execCommand('copy');
            this.addToast('Salin Sukses! Silakan paste di ChatGPT/Claude/DeepSeek.');
          } catch (err) {
            this.addToast('Gagal menyalin otomatis.', 'error');
          }
          document.body.removeChild(textarea);
        },

        downloadAsTXT() {
          const blob = new Blob([this.generatedPrompt], { type: 'text/plain;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${this.form.appName.toLowerCase().replace(/[^a-z0-9]/g, '_')}_prompt.txt`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          this.addToast('Berkas TXT berhasil diunduh!');
        },

        downloadAsMarkdown() {
          const blob = new Blob([this.generatedPrompt], { type: 'text/markdown;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${this.form.appName.toLowerCase().replace(/[^a-z0-9]/g, '_')}_prompt.md`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          this.addToast('Berkas Markdown (.md) diunduh!');
        },

        compileSystemPrompt() {
          const f = this.form;
          const s = this.settings;
          
          let doc = ``;
          
          // Header & Meta Context
          doc += `# PROMPT PENGEMBANGAN APLIKASI PROFESIONAL (SYSTEM SPECIFICATION)\n\n`;
          doc += `## KONTEKS PERAN (PERSONA)\n`;
          doc += `Anda akan bertindak sebagai ahli pengembang perangkat lunak profesional dengan peran khusus sebagai:\n`;
          f.aiRoles.forEach(r => {
            doc += `- **${r}**\n`;
          });
          doc += `Target implementasi interpretasi kecerdasan buatan Anda dirancang optimal untuk mesin: **${f.targetAI}**.\n\n`;
          
          doc += `## TUJUAN UTAMA PROYEK\n`;
          doc += `Tolong bangun draf arsitektur sistem, struktur berkas, dan boilerplate kode fungsional yang siap pakai untuk proyek berikut:\n`;
          doc += `- **Nama Aplikasi:** ${f.appName}\n`;
          doc += `- **Jenis Aplikasi:** ${f.appType}\n`;
          doc += `- **Framework Utama (Platform):** ${f.platform}\n`;
          doc += `- **Database Utama:** ${f.database}\n`;
          doc += `- **Tingkat Kedalaman Detail:** ${f.detailLevel.toUpperCase()}\n\n`;

          // Google App Script Specific Segment
          if (f.platform === 'Google App Script') {
            doc += `## SPESIFIKASI KHUSUS GOOGLE APP SCRIPT\n`;
            doc += `- **Struktur Penulisan File:** ${f.gasStructure}\n`;
            doc += `- **Sistem Otomatisasi Google Sheets:**\n`;
            f.gasSheets.forEach(g => {
              doc += `  - [x] ${g}\n`;
            });
            doc += `- **Model Hosting Frontend:** ${f.gasHosting}\n`;
            if (f.gasDeployGuide) doc += `- **Deployment:** Sertakan panduan proses deploy di platform Google App Script.\n`;
            if (f.gasPublishGuide) doc += `- **Publishing:** Sertakan instruksi untuk publish Web App agar dapat digunakan secara publik.\n`;
            doc += `\n`;
          }

          // Auth & User Roles
          doc += `## MANAJEMEN OTENTIKASI & HAK AKSES (RBAC)\n`;
          doc += `- **Metode Log-In Keamanan:** ${f.authMethod}\n`;
          doc += `- **Role Hak Akses yang Wajib Didukung (Role-Based Access Control):**\n`;
          f.roles.forEach(r => {
            doc += `  - [x] Peran Pengguna: ${r}\n`;
          });
          doc += `\n`;

          // Dashboard Widgets Layout
          doc += `## SPESIFIKASI BERANDA (DASHBOARD INTERNAL)\n`;
          doc += `Saat user berhasil login, antarmuka dashboard harus menyertakan widget:\n`;
          f.dashboard.forEach(w => {
            doc += `- [x] Widget ${w}\n`;
          });
          doc += `\n`;

          // CRUD Capability
          doc += `## MANIPULASI DATA UTAMA (OPERASI CRUD & LAPORAN)\n`;
          doc += `Sediakan skema kontroler untuk mengelola transaksi data dengan dukungan:\n`;
          f.crud.forEach(c => {
            doc += `- [x] Kemampuan ${c}\n`;
          });
          doc += `\n`;

          // Search Capability
          doc += `## KONTROL QUERY (PENCARIAN & FILTER)\n`;
          doc += `Sediakan fungsi filter dan sorting untuk mengoptimalkan memori runtime:\n`;
          f.search.forEach(s => {
            doc += `- [x] Fitur ${s}\n`;
          });
          doc += `\n`;

          // UI Style
          doc += `## SPESIFIKASI DESAIN ANTARMUKA (UI / UX)\n`;
          doc += `- **Framework CSS yang Digunakan:** ${f.uiFramework}\n`;
          doc += `- **Skema Tema Warna:** ${f.uiModes.join(', ')}\n`;
          doc += `- **Optimalisasi Mobile Layar Sentuh:**\n`;
          f.mobile.forEach(m => {
            doc += `  - [x] Kompatibilitas: ${m}\n`;
          });
          doc += `\n`;

          // SEO & AI Grounding
          doc += `## STANDAR OPTIMASI SEO & RAMAH AI BOT\n`;
          doc += `Untuk memaksimalkan discovery web, pasang indikator markup berikut:\n`;
          f.seo.forEach(s => {
            doc += `- [x] Protokol SEO: ${s}\n`;
          });
          doc += `\n`;

          // Security Guardrails
          doc += `## PROTOKOL PERTAHANAN KEAMANAN DATA\n`;
          doc += `Guna menghindari penetrasi celah bug, wajib mengimplementasikan:\n`;
          f.security.forEach(s => {
            doc += `- [x] Sanitasi & Validasi: ${s}\n`;
          });
          doc += `\n`;

          // Performance Features
          doc += `## EFISIENSI & PERFORMA APLIKASI\n`;
          doc += `Optimalkan waktu rendering aset web dengan menyertakan fitur:\n`;
          f.performance.forEach(p => {
            doc += `- [x] Mekanisme Performa: ${p}\n`;
          });
          doc += `\n`;

          // Main UI Components
          doc += `## KOMPONEN UI UTAMA\n`;
          doc += `Sediakan kode visual siap pakai untuk elemen antarmuka:\n`;
          f.components.forEach(c => {
            doc += `- [x] Komponen UI: ${c}\n`;
          });
          doc += `\n`;

          // Media Uploads
          doc += `## MANAJEMEN UNGGAHAN MEDIA (FILE UPLOADS)\n`;
          doc += `Sistem backend dan validasi harus mendukung jenis berkas berikut:\n`;
          f.uploads.forEach(u => {
            doc += `- [x] Ekstensi Berkas: ${u}\n`;
          });
          doc += `\n`;

          // Integrations
          doc += `## INTEGRASI APIS & LAYANAN PIHAK KETIGA\n`;
          doc += `Konfigurasikan pustaka kode konektor untuk menghubungkan sistem dengan:\n`;
          f.integrations.forEach(i => {
            doc += `- [x] Konektor Pihak Ketiga: ${i}\n`;
          });
          doc += `\n`;

          // Output Docs
          doc += `## PERSYARATAN DOKUMENTASI AKHIR KODE\n`;
          doc += `Pada akhir jawaban Anda, wajib melampirkan berkas penjelas berupa:\n`;
          f.docs.forEach(d => {
            doc += `- [x] Dokumentasi: ${d}\n`;
          });
          doc += `\n`;

          // Final Command directives
          doc += `## INSTRUKSI EKSEKUSI UNTUK AI\n`;
          doc += `1. **Clean Code:** Pastikan penulisan kode mematuhi kaidah pemrograman bersih (Clean Code), modular, terpisahkan antara logika bisnis (Business Logic) dan tampilan visual (View).\n`;
          doc += `2. **No Placeholders:** Jangan gunakan komentar seperti '// tulis logika di sini'. Berikan simulasi baris kode tiruan yang aman dan bekerja sempurna.\n`;
          doc += `3. **Production Ready:** Berikan petunjuk instalasi dependensi, instruksi konfigurasi berkas rahasia (.env), serta struktur direktori yang rapi dan logis.\n`;
          doc += `\n`;
          doc += `Harap buat respons dalam **${s.language === 'id' ? 'Bahasa Indonesia yang profesional' : 'English (US)'}** sesuai standar internasional.`;

          this.generatedPrompt = doc;
        }
      }
    }
  </script>

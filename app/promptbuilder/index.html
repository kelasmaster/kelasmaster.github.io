<!DOCTYPE html>
<html lang="id" x-data="promptApp()" :class="{ 'dark': darkMode }" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Prompt Builder - Generator Prompt Aplikasi Profesional</title>
  <meta name="description" content="Generator prompt aplikasi terlengkap untuk ChatGPT, Gemini, Claude, DeepSeek, dan AI lainnya.">
  
  <!-- Tailwind CSS & Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eef2ff',
              100: '#e0e7ff',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              900: '#312e81',
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Alpine.js (Lightweight Interactivity) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

  <!-- TOAST NOTIFICATION CONTAINER -->
  <div class="fixed top-5 right-5 z-50 flex flex-col gap-2 pointer-events-none">
    <template x-for="toast in toasts" :key="toast.id">
      <div x-transition:enter="transition ease-out duration-300"
           x-transition:enter-start="opacity-0 transform translate-y-2 md:translate-y-0 md:translate-x-2"
           x-transition:enter-end="opacity-100 transform translate-y-0 md:translate-x-0"
           x-transition:leave="transition ease-in duration-200"
           x-transition:leave-start="opacity-100"
           x-transition:leave-end="opacity-0"
           class="pointer-events-auto flex items-center gap-3 bg-white dark:bg-slate-900 shadow-xl border border-slate-100 dark:border-slate-800 px-4 py-3 rounded-xl max-w-sm">
        <div class="p-1 rounded-full text-white" :class="toast.type === 'success' ? 'bg-emerald-500' : 'bg-red-500'">
          <i :data-lucide="toast.type === 'success' ? 'check' : 'alert-circle'" class="w-4 h-4"></i>
        </div>
        <p class="text-sm font-medium" x-text="toast.message"></p>
      </div>
    </template>
  </div>

  <!-- MAIN WRAPPER -->
  <div class="flex flex-1 overflow-hidden h-screen">
    
    <!-- DESKTOP SIDEBAR -->
    <aside class="hidden md:flex flex-col w-64 bg-white dark:bg-slate-900 border-r border-slate-100 dark:border-slate-800 shrink-0">
      <div class="p-6 flex items-center gap-3 border-b border-slate-100 dark:border-slate-800">
        <div class="p-2 bg-brand-500 text-white rounded-xl">
          <i data-lucide="sparkles" class="w-6 h-6 animate-pulse"></i>
        </div>
        <div>
          <h1 class="font-extrabold text-md bg-gradient-to-r from-brand-500 to-indigo-400 bg-clip-text text-transparent">PromptBuilder</h1>
          <span class="text-xs text-slate-400 font-semibold">v1.1 (2026)</span>
        </div>
      </div>
      
      <!-- Sidebar Navigation -->
      <nav class="flex-1 p-4 space-y-1.5 overflow-y-auto">
        <button @click="activeTab = 'dashboard'" :class="activeTab === 'dashboard' ? 'bg-brand-50 text-brand-600 dark:bg-brand-950/50 dark:text-brand-400' : 'hover:bg-slate-50 dark:hover:bg-slate-800/50'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition">
          <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
        </button>
        <button @click="startNewPrompt()" :class="activeTab === 'builder' ? 'bg-brand-50 text-brand-600 dark:bg-brand-950/50 dark:text-brand-400' : 'hover:bg-slate-50 dark:hover:bg-slate-800/50'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition">
          <i data-lucide="sliders" class="w-5 h-5"></i> Prompt Builder
        </button>
        <button @click="activeTab = 'templates'" :class="activeTab === 'templates' ? 'bg-brand-50 text-brand-600 dark:bg-brand-950/50 dark:text-brand-400' : 'hover:bg-slate-50 dark:hover:bg-slate-800/50'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition">
          <i data-lucide="layers" class="w-5 h-5"></i> Template Bawaan
        </button>
        <button @click="activeTab = 'settings'" :class="activeTab === 'settings' ? 'bg-brand-50 text-brand-600 dark:bg-brand-950/50 dark:text-brand-400' : 'hover:bg-slate-50 dark:hover:bg-slate-800/50'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition">
          <i data-lucide="settings" class="w-5 h-5"></i> Pengaturan
        </button>
      </nav>

      <!-- Sidebar Footer / Darkmode Toggle -->
      <div class="p-4 border-t border-slate-100 dark:border-slate-800">
        <button @click="toggleDarkMode()" class="w-full flex items-center justify-between px-4 py-2.5 bg-slate-50 dark:bg-slate-800 rounded-xl text-sm font-medium hover:opacity-90 transition">
          <span class="flex items-center gap-2">
            <i :data-lucide="darkMode ? 'sun' : 'moon'" class="w-4 h-4 text-amber-500"></i>
            <span x-text="darkMode ? 'Light Mode' : 'Dark Mode'"></span>
          </span>
          <span class="w-2 h-2 rounded-full bg-brand-500"></span>
        </button>
      </div>
    </aside>

    <!-- CONTENT CONTAINER -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
      
      <!-- DESKTOP NAVBAR -->
      <header class="flex items-center justify-between px-6 py-4 bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800 shrink-0">
        <div class="flex items-center gap-4">
          <!-- Mobile Menu Trigger -->
          <span class="md:hidden p-2 bg-brand-500 text-white rounded-lg">
            <i data-lucide="sparkles" class="w-5 h-5"></i>
          </span>
          <h2 class="text-lg font-bold text-slate-800 dark:text-white capitalize" x-text="activeTab === 'builder' ? 'Prompt Wizard (Langkah ' + currentStep + '/20)' : activeTab"></h2>
        </div>
        <div class="flex items-center gap-3">
          <div class="text-right hidden sm:block">
            <p class="text-xs text-slate-400 font-semibold">User Akun</p>
            <p class="text-sm font-bold text-slate-700 dark:text-slate-300">Wahyudi</p>
          </div>
          <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-500 to-indigo-500 flex items-center justify-center text-white font-black text-sm">W</div>
        </div>
      </header>

      <!-- MAIN SCROLLABLE BODY -->
      <div class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8">
        
        <!-- SKELETON LOADING VIEW (Simulasi loading cepat saat ganti tab) -->
        <div x-show="loading" class="space-y-6">
          <div class="h-8 bg-slate-200 dark:bg-slate-800 rounded-lg w-1/4 animate-pulse"></div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="h-32 bg-slate-200 dark:bg-slate-800 rounded-2xl animate-pulse"></div>
            <div class="h-32 bg-slate-200 dark:bg-slate-800 rounded-2xl animate-pulse"></div>
            <div class="h-32 bg-slate-200 dark:bg-slate-800 rounded-2xl animate-pulse"></div>
          </div>
          <div class="h-64 bg-slate-200 dark:bg-slate-800 rounded-2xl animate-pulse"></div>
        </div>

        <div x-show="!loading" class="transition-opacity duration-200">
          
          <!-- ==================== DASHBOARD TAB ==================== -->
          <template x-if="activeTab === 'dashboard'">
            <div class="space-y-6">
              <!-- Stat Cards -->
              <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-white dark:bg-slate-900 p-5 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm flex items-center gap-4">
                  <div class="p-3 bg-indigo-50 dark:bg-indigo-950/50 text-indigo-500 rounded-xl">
                    <i data-lucide="file-text" class="w-6 h-6"></i>
                  </div>
                  <div>
                    <p class="text-xs font-semibold text-slate-400">Total Prompt</p>
                    <p class="text-2xl font-black text-slate-800 dark:text-white" x-text="savedPrompts.length"></p>
                  </div>
                </div>

                <div class="bg-white dark:bg-slate-900 p-5 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm flex items-center gap-4">
                  <div class="p-3 bg-pink-50 dark:bg-pink-950/50 text-pink-500 rounded-xl">
                    <i data-lucide="heart" class="w-6 h-6"></i>
                  </div>
                  <div>
                    <p class="text-xs font-semibold text-slate-400">Favorit</p>
                    <p class="text-2xl font-black text-slate-800 dark:text-white" x-text="savedPrompts.filter(p => p.fav).length"></p>
                  </div>
                </div>

                <div class="bg-white dark:bg-slate-900 p-5 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm flex items-center gap-4 col-span-2 sm:col-span-1">
                  <div class="p-3 bg-amber-50 dark:bg-amber-950/50 text-amber-500 rounded-xl">
                    <i data-lucide="history" class="w-6 h-6"></i>
                  </div>
                  <div>
                    <p class="text-xs font-semibold text-slate-400">Terakhir Dibuat</p>
                    <p class="text-sm font-bold text-slate-700 dark:text-slate-300 truncate max-w-[120px]" x-text="savedPrompts.length > 0 ? savedPrompts[0].appName : '-'"></p>
                  </div>
                </div>
              </div>

              <!-- Main Hero Call-to-action -->
              <div class="bg-gradient-to-r from-brand-600 to-indigo-600 rounded-3xl p-6 md:p-10 text-white shadow-xl relative overflow-hidden">
                <div class="absolute right-0 bottom-0 opacity-10 transform translate-x-12 translate-y-12">
                  <i data-lucide="sparkles" class="w-80 h-80"></i>
                </div>
                <div class="max-w-xl relative z-10 space-y-4">
                  <h3 class="text-2xl md:text-3xl font-extrabold tracking-tight">Butuh Prompt Pembuatan Aplikasi Tanpa Cela?</h3>
                  <p class="text-indigo-100 text-sm md:text-base leading-relaxed">Hindari jawaban AI yang terpotong, berputar-putar, atau salah menentukan modul. Gunakan sistem wizard multi-langkah kami untuk merangkai standar profesional dalam sekejap.</p>
                  <button @click="startNewPrompt()" class="bg-white text-brand-700 font-bold px-6 py-3 rounded-xl hover:bg-slate-50 transition shadow-md flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> Buat Prompt Baru
                  </button>
                </div>
              </div>

              <!-- Last Created & History -->
              <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Saved History -->
                <div class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800 p-6 space-y-4">
                  <h4 class="text-md font-bold flex items-center gap-2">
                    <i data-lucide="archive" class="w-5 h-5 text-indigo-500"></i> Prompt Tersimpan Anda
                  </h4>
                  <div class="space-y-3 max-h-80 overflow-y-auto pr-2">
                    <template x-if="savedPrompts.length === 0">
                      <div class="text-center py-8 text-slate-400 space-y-2">
                        <i data-lucide="folder-open" class="w-10 h-10 mx-auto opacity-40"></i>
                        <p class="text-sm">Belum ada prompt yang disimpan.</p>
                      </div>
                    </template>
                    <template x-for="(p, index) in savedPrompts" :key="p.id">
                      <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-slate-100 dark:border-slate-800 hover:border-slate-200 transition">
                        <div>
                          <span class="px-2 py-0.5 text-[10px] font-bold bg-indigo-100 text-indigo-700 dark:bg-indigo-950 dark:text-indigo-300 rounded-md" x-text="p.platform"></span>
                          <h5 class="font-bold text-sm text-slate-800 dark:text-white mt-1" x-text="p.appName"></h5>
                        </div>
                        <div class="flex items-center gap-1">
                          <button @click="toggleFav(p.id)" class="p-2 rounded-lg text-slate-400 hover:text-pink-500 transition">
                            <i data-lucide="heart" class="w-4 h-4" :class="p.fav ? 'fill-pink-500 text-pink-500' : ''"></i>
                          </button>
                          <button @click="loadSavedPrompt(p)" class="p-2 bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 text-brand-600 dark:text-brand-400 rounded-xl hover:bg-brand-50 transition text-xs font-bold">
                            Buka
                          </button>
                          <button @click="deletePrompt(p.id)" class="p-2 text-slate-400 hover:text-red-500 transition">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                          </button>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>

                <!-- Tips / FAQ Accordion -->
                <div class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800 p-6 space-y-4">
                  <h4 class="text-md font-bold flex items-center gap-2">
                    <i data-lucide="help-circle" class="w-5 h-5 text-emerald-500"></i> Mengapa Prompt Builder?
                  </h4>
                  <div class="space-y-3">
                    <div class="border border-slate-100 dark:border-slate-800 rounded-2xl p-4">
                      <p class="font-bold text-sm mb-1">1. Menghindari "Halusinasi" AI</p>
                      <p class="text-xs text-slate-400 leading-relaxed">Formulir 20 langkah dirancang untuk menetapkan batas-batas yang sangat tegas mengenai teknologi, batasan keamanan, integrasi, dan pola arsitektur kode.</p>
                    </div>
                    <div class="border border-slate-100 dark:border-slate-800 rounded-2xl p-4">
                      <p class="font-bold text-sm mb-1">2. Dukungan Google Apps Script Maksimal</p>
                      <p class="text-xs text-slate-400 leading-relaxed">Mendukung setup multi-file, integrasi otomatis Google Sheets API, pembuatan mockup spreadsheet cepat, dan petunjuk deployment tanpa hambatan.</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </template>

          <!-- ==================== PROMPT BUILDER TAB ==================== -->
          <template x-if="activeTab === 'builder'">
            <div class="max-w-4xl mx-auto space-y-8">
              
              <!-- Progress Indicator -->
              <div class="bg-white dark:bg-slate-900 p-4 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm space-y-2">
                <div class="flex justify-between items-center text-xs font-bold text-slate-400">
                  <span x-text="'Langkah ' + currentStep + ' dari 20'"></span>
                  <span class="text-brand-500" x-text="Math.round((currentStep/20)*100) + '% Selesai'"></span>
                </div>
                <div class="w-full bg-slate-100 dark:bg-slate-800 h-2 rounded-full overflow-hidden">
                  <div class="bg-gradient-to-r from-brand-500 to-indigo-500 h-full transition-all duration-300" :style="'width: ' + ((currentStep/20)*100) + '%'"></div>
                </div>
              </div>

              <!-- STEP CONTAINER (Card) -->
              <div class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800 p-6 md:p-8 shadow-sm space-y-6">
                
                <!-- LANGKAH 1: Pilih Platform -->
                <div x-show="currentStep === 1" class="space-y-4">
                  <div class="flex items-center gap-3">
                    <div class="p-2 bg-indigo-50 text-indigo-500 dark:bg-indigo-950 rounded-xl"><i data-lucide="layers" class="w-5 h-5"></i></div>
                    <h3 class="text-lg font-bold">Langkah 1: Pilih Platform / Framework Utama</h3>
                  </div>
                  <p class="text-xs text-slate-400">Pilih fondasi dasar tumpukan teknologi (tech-stack) aplikasi Anda.</p>
                  <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <template x-for="plat in techPlatforms" :key="plat">
                      <button @click="form.platform = plat" :class="form.platform === plat ? 'border-brand-500 bg-brand-50/50 dark:bg-brand-950/20 text-brand-600 dark:text-brand-400' : 'border-slate-100 dark:border-slate-800 hover:border-slate-200'" class="p-4 border rounded-2xl text-left font-bold text-sm transition flex items-center justify-between">
                        <span x-text="plat"></span>
                        <span x-show="form.platform === plat" class="w-2.5 h-2.5 rounded-full bg-brand-500"></span>
                      </button>
                    </template>
                  </div>
                </div>

                <!-- LANGKAH 2: Jenis Aplikasi -->
                <div x-show="currentStep === 2" class="space-y-4">
                  <div class="flex items-center gap-3">
                    <div class="p-2 bg-indigo-50 text-indigo-500 dark:bg-indigo-950 rounded-xl"><i data-lucide="code" class="w-5 h-5"></i></div>
                    <h3 class="text-lg font-bold">Langkah 2: Jenis / Model Aplikasi</h3>
                  </div>
                  <p class="text-xs text-slate-400">Masukkan nama dan jenis aplikasi yang ingin dikembangkan.</p>
                  <div class="space-y-4">
                    <div>
                      <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Nama Aplikasi</label>
                      <input type="text" x-model="form.appName" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-brand-500" placeholder="Contoh: Kasir Pintar Cileungsi">
                    </div>
                    <div>
                      <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Pilih Jenis Aplikasi</label>
                      <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                        <template x-for="type in appTypes" :key="type">
                          <button @click="form.appType = type" :class="form.appType === type ? 'bg-brand-500 text-white' : 'bg-slate-50 dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700'" class="p-3 rounded-xl text-xs font-bold text-center transition" x-text="type"></button>
                        </template>
                      </div>
                      <input type="text" x-model="form.appType" class="w-full mt-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-brand-500" placeholder="Ketik custom jika tidak ada di atas">
                    </div>
                  </div>
                </div>

                <!-- LANGKAH 3: Khusus Google Apps Script -->
                <div x-show="currentStep === 3" class="space-y-6">
                  <div class="flex items-center gap-3">
                    <div class="p-2 bg-indigo-50 text-indigo-500 dark:bg-indigo-950 rounded-xl"><i data-lucide="file-spreadsheet" class="w-5 h-5"></i></div>
                    <h3 class="text-lg font-bold">Langkah 3: Aturan Khusus Google Apps Script</h3>
                  </div>
                  <div class="bg-amber-50 dark:bg-amber-950/30 text-amber-700 dark:text-amber-400 p-4 rounded-2xl text-xs flex gap-3 leading-relaxed">
                    <i data-lucide="info" class="w-5 h-5 shrink-0"></i>
                    <span>Bagian ini mendominasi output prompt jika Anda memilih <strong>Google Apps Script</strong> pada Langkah 1. Jika tidak, pengaturan ini akan diabaikan.</span>
                  </div>

                  <!-- Struktur File -->
                  <div class="space-y-3">
                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Struktur File</h4>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                      <label class="p-4 border border-slate-100 dark:border-slate-800 rounded-2xl cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 flex items-center gap-3">
                        <input type="radio" name="gas_structure" value="Banyak file" x-model="form.gas.structure" class="text-brand-500">
                        <span class="text-sm font-semibold">Banyak File Terpisah</span>
                      </label>
                      <label class="p-4 border border-slate-100 dark:border-slate-800 rounded-2xl cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 flex items-center gap-3">
                        <input type="radio" name="gas_structure" value="Hanya Code.gs & Index.html" x-model="form.gas.structure" class="text-brand-500">
                        <span class="text-sm font-semibold">Code.gs &amp; Index.html</span>
                      </label>
                      <label class="p-4 border border-slate-100 dark:border-slate-800 rounded-2xl cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 flex items-center gap-3">
                        <input type="radio" name="gas_structure" value="Bebas AI menentukan" x-model="form.gas.structure" class="text-brand-500">
                        <span class="text-sm font-semibold">Bebas Ditentukan AI</span>
                      </label>
                    </div>
                  </div>

                  <!-- Spreadsheet Integrations -->
                  <div class="space-y-3">
                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Fitur Otomatis Spreadsheet</h4>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                      <template x-for="f in gasFeatures" :key="f">
                        <label class="p-3 border border-slate-100 dark:border-slate-800 rounded-xl cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 flex items-center gap-2">
                          <input type="checkbox" :value="f" x-model="form.gas.sheetsOptions" class="rounded text-brand-500">
                          <span class="text-xs font-semibold" x-text="f"></span>
                        </label>
                      </template>
                    </div>
                  </div>

                  <!-- Hosting Frontend & Backend -->
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Hosting Frontend</h4>
                      <select x-model="form.gas.hostingFrontend" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-brand-500">
                        <option value="HTML Service">HTML Service (Apps Script)</option>
                        <option value="Github Pages">Github Pages</option>
                        <option value="Cloudflare Pages">Cloudflare Pages</option>
                      </select>
                    </div>
                    <div>
                      <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Hosting Backend</h4>
                      <input type="text" readonly value="Google App Script" class="w-full bg-slate-100 dark:bg-slate-800/50 border-none rounded-xl p-3 text-sm text-slate-400 cursor-not-allowed">
                    </div>
                  </div>

                  <!-- Deployment Checklist -->
                  <div class="flex gap-4">
                    <label class="flex items-center gap-2 cursor-pointer">
                      <input type="checkbox" x-model="form.gas.deployGuide" class="rounded text-brand-500">
                      <span class="text-xs font-semibold">Sertakan panduan Deploy</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">

                <h3 class="text-lg font-bold">Pilih Template Cepat</h3>
                <p class="text-xs text-slate-400 leading-relaxed">Gunakan boilerplate industri yang paling populer untuk melompat langsung ke halaman keluaran.</p>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <template x-for="tpl in staticTemplates" :key="tpl.name">
                  <div class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-3xl p-5 space-y-4 hover:shadow-md transition">
                    <div class="flex justify-between items-start">
                      <div class="p-2.5 bg-indigo-50 dark:bg-indigo-950/50 text-indigo-500 rounded-xl">
                        <i data-lucide="layout-template" class="w-5 h-5"></i>
                      </div>
                      <span class="px-2 py-0.5 text-[9px] font-bold bg-emerald-100 text-emerald-700 rounded" x-text="tpl.defaultPlatform"></span>
                    </div>
                    <div>
                      <h4 class="font-bold text-sm text-slate-800 dark:text-white" x-text="tpl.name"></h4>
                      <p class="text-xs text-slate-400 mt-1 leading-relaxed" x-text="tpl.desc"></p>
                    </div>
                    <button @click="applyTemplate(tpl)" class="w-full py-2.5 bg-slate-50 hover:bg-brand-50 hover:text-brand-600 dark:bg-slate-800 dark:hover:bg-slate-700 text-xs font-bold rounded-xl transition">
                      Gunakan Template
                    </button>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- ==================== SETTINGS TAB ==================== -->
          <template x-if="activeTab === 'settings'">
            <div class="max-w-2xl mx-auto bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-3xl p-6 md:p-8 space-y-6">
              <h3 class="text-lg font-bold border-b border-slate-100 dark:border-slate-800 pb-3">Konfigurasi Default Builder</h3>
              
              <div class="space-y-4">
                <div>
                  <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Default Platform</label>
                  <select x-model="settings.defaultPlatform" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl p-3 text-sm">
                    <template x-for="plat in techPlatforms" :key="plat">
                      <option :value="plat" x-text="plat"></option>
                    </template>
                  </select>
                </div>

                <div>
                  <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Default Target AI</label>
                  <select x-model="settings.defaultAI" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl p-3 text-sm">
                    <template x-for="ai in targetAIList" :key="ai">
                      <option :value="ai" x-text="ai"></option>
                    </template>
                  </select>
                </div>

                <div>
                  <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Tingkat Detail Default</label>
                  <select x-model="settings.defaultDetail" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl p-3 text-sm">
                    <template x-for="lvl in detailLevels" :key="lvl">
                      <option :value="lvl" x-text="lvl"></option>
                    </template>
                  </select>
                </div>

                <div>
                  <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Bahasa Interface &amp; Prompt</label>
                  <select x-model="settings.language" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl p-3 text-sm">
                    <option value="id">Bahasa Indonesia</option>
                    <option value="en">English (US)</option>
                  </select>
                </div>
              </div>

              <div class="pt-4 border-t border-slate-100 dark:border-slate-800">
                <button @click="saveSettings()" class="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl text-sm transition">
                  Simpan Konfigurasi Default
                </button>
              </div>
            </div>
          </template>

        </div>
      </div>

      <!-- MOBILE BOTTOM NAVIGATION -->
      <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 py-2 px-6 flex justify-between items-center z-40">
        <button @click="activeTab = 'dashboard'" :class="activeTab === 'dashboard' ? 'text-brand-600' : 'text-slate-400'" class="flex flex-col items-center gap-1">
          <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
          <span class="text-[9px] font-bold">Beranda</span>
        </button>
        <button @click="startNewPrompt()" :class="activeTab === 'builder' ? 'text-brand-600' : 'text-slate-400'" class="flex flex-col items-center gap-1">
          <i data-lucide="sliders" class="w-5 h-5"></i>
          <span class="text-[9px] font-bold">Builder</span>
        </button>
        <button @click="activeTab = 'templates'" :class="activeTab === 'templates' ? 'text-brand-600' : 'text-slate-400'" class="flex flex-col items-center gap-1">
          <i data-lucide="layers" class="w-5 h-5"></i>
          <span class="text-[9px] font-bold">Template</span>
        </button>
        <button @click="activeTab = 'settings'" :class="activeTab === 'settings' ? 'text-brand-600' : 'text-slate-400'" class="flex flex-col items-center gap-1">
          <i data-lucide="settings" class="w-5 h-5"></i>
          <span class="text-[9px] font-bold">Setelan</span>
        </button>
      </nav>

    </main>
  </div>

  <!-- APPLICATION LOGIC & STATE (Alpine.js integration) -->
  <script>
    function promptApp() {
      return {
        activeTab: 'dashboard',
        currentStep: 1,
        loading: false,
        darkMode: localStorage.getItem('darkMode') === 'true',
        toasts: [],
        generatedPrompt: '',
        
        // Static Arrays
        techPlatforms: ['Google App Script', 'Google Firebase', 'HTML CSS JavaScript', 'PHP', 'Laravel', 'React', 'Vue', 'Next.js', 'Node.js', 'Flutter Web', 'WordPress', 'PWA', 'Canvas', 'Lainnya'],
        appTypes: ['POS', 'CRM', 'LMS', 'ERP', 'Inventory', 'Laundry', 'Toko Online', 'Landing Page', 'Company Profile', 'Form', 'Survey', 'Booking', 'Email Marketing', 'Sertifikat', 'Chat', 'Blog', 'Sistem Akademik'],
        gasFeatures: ['Buat Spreadsheet otomatis', 'Buat Sheet otomatis', 'Header otomatis', 'Validasi Data', 'Rumus', 'Data contoh', 'Dropdown', 'Format warna'],
        databases: ['Spreadsheet', 'Firestore', 'Realtime Database', 'MySQL', 'PostgreSQL', 'SQLite', 'Supabase'],
        authMethods: ['Tidak ada', 'Username Password', 'Google Login', 'OTP', 'Email Login'],
        rolesList: ['Super Admin', 'Admin', 'Operator', 'Member', 'Customer', 'Owner', 'Bebas menambah Role'],
        dashboardWidgets: ['Statistik', 'Grafik', 'Card', 'Kalender', 'Shortcut', 'Todo', 'Aktivitas', 'Notifikasi', 'Quick Action'],
        crudOptions: ['Tambah', 'Edit', 'Hapus', 'Detail', 'Import Excel', 'Export Excel', 'Export PDF', 'Print', 'Copy', 'Bulk Delete'],
        searchFeatures: ['Search', 'Filter', 'Sorting', 'Pagination', 'Advanced Search'],
        uiFrameworks: ['Bootstrap', 'Tailwind', 'Material Design'],
        mobileOptions: ['Responsive', 'Mobile First', 'Tablet Friendly', 'PWA', 'Offline Mode', 'Installable'],
        seoList: ['Meta Title', 'Meta Description', 'Open Graph', 'Twitter Card', 'robots.txt', 'sitemap.xml', 'Canonical', 'JSON-LD', 'Schema.org', 'Breadcrumb', 'AI Friendly', 'Google AI Overview Friendly', 'Perplexity Friendly', 'ChatGPT Friendly', 'Semantic HTML'],
        securityOptions: ['Validasi Input', 'Sanitasi Input', 'Anti XSS', 'Anti SQL Injection', 'CSRF', 'Session Timeout', 'Enkripsi Password', 'Audit Log'],
        perfList: ['Lazy Loading', 'Cache', 'Compression', 'Minify CSS', 'Minify JS', 'Optimasi Gambar', 'CDN'],
        componentsList: ['Sidebar', 'Navbar', 'Footer', 'Modal', 'Toast', 'Loader', 'Skeleton', 'Floating Button', 'Breadcrumb', 'Progress Bar', 'Data Table'],
        fileUploads: ['Image', 'PDF', 'Excel', 'Audio', 'Video', 'ZIP'],
        integrationList: ['Gmail', 'Google Drive', 'Google Sheets', 'Google Calendar', 'QR Code', 'Barcode', 'WhatsApp', 'Telegram', 'REST API', 'Midtrans', 'Xendit', 'RajaOngkir'],
        docsList: ['README', 'Flowchart', 'ERD', 'Use Case', 'Struktur Folder', 'Cara Install', 'Cara Deploy', 'API Documentation'],
        targetAIList: ['ChatGPT', 'Gemini', 'Claude', 'Grok', 'DeepSeek', 'Copilot', 'Universal'],
        detailLevels: ['ringkas', 'standar', 'lengkap', 'sangat detail'],
        aiPersonas: ['Software Architect', 'Senior Full Stack Developer', 'Google App Script Expert', 'Firebase Expert', 'UI UX Designer', 'SEO Expert', 'DevOps Engineer', 'Security Engineer'],

        // Default Form State
        form: {
          platform: 'HTML CSS JavaScript',
          appName: '',
          appType: 'POS',
          gas: {
            structure: 'Hanya Code.gs & Index.html',
            sheetsOptions: [],
            hostingFrontend: 'HTML Service',
            deployGuide: true,
            publishGuide: true
          },
          database: 'Spreadsheet',
          authMethod: 'Username Password',
          roles: ['Admin'],
          dashboardItems: ['Statistik', 'Card'],
          crud: ['Tambah', 'Edit', 'Hapus'],
          search: ['Search', 'Filter'],
          uiFramework: 'Tailwind',
          uiThemes: ['Light', 'Dark'],
          mobile: ['Responsive', 'Mobile First'],
          seo: ['Meta Title', 'Meta Description'],
          security: ['Validasi Input'],
          performance: ['Lazy Loading'],
          components: ['Sidebar', 'Navbar'],
          uploads: ['Image'],
          integrations: ['REST API'],
          docs: ['README', 'Struktur Folder'],
          targetAI: 'Universal',
          detailLevel: 'lengkap',
          aiRoles: ['Senior Full Stack Developer']
        },

        // Settings State
        settings: {
          defaultPlatform: 'HTML CSS JavaScript',
          defaultAI: 'Universal',
          defaultDetail: 'lengkap',
          language: 'id'
        },

        // User Data lists (Simulated Local Storage)
        savedPrompts: [],
        
        staticTemplates: [
          { name: 'Kasir Sederhana', desc: 'Aplikasi kasir (POS) ringkas berbasis Google Apps Script dan Sheets.', defaultPlatform: 'Google App Script' },
          { name: 'CRM UMKM', desc: 'Sistem CRM untuk pengelolaan prospek pelanggan UMKM lokal.', defaultPlatform: 'Laravel' },
          { name: 'LMS Sekolah', desc: 'Portal ujian belajar online interaktif berbasis Next.js.', defaultPlatform: 'Next.js' }
        ],

        init() {
          // Load Saved Prompts from Storage
          const localData = localStorage.getItem('app_prompts');
          if (localData) {
            this.savedPrompts = JSON.parse(localData);
          } else {
            // Seed data
            this.savedPrompts = [
              { id: 1, appName: 'Laundry POS Cileungsi', platform: 'Google App Script', fav: true, form: JSON.parse(JSON.stringify(this.form)) }
            ];
            this.saveToLocalStorage();
          }

          // Load Settings
          const localSettings = localStorage.getItem('app_settings');
          if (localSettings) {
            this.settings = JSON.parse(localSettings);
            this.form.platform = this.settings.defaultPlatform;
            this.form.targetAI = this.settings.defaultAI;
            this.form.detailLevel = this.settings.defaultDetail;
          }

          // Render icons dynamically on change
          this.$watch('activeTab', () => {
            this.loading = true;
            setTimeout(() => { 
              this.loading = false;
              this.$nextTick(() => { lucide.createIcons(); });
            }, 300);
          });

          this.$nextTick(() => { lucide.createIcons(); });
        },

        toggleDarkMode() {
          this.darkMode = !this.darkMode;
          localStorage.setItem('darkMode', this.darkMode);
        },

        addToast(message, type = 'success') {
          const id = Date.now();
          this.toasts.push({ id, message, type });
          this.$nextTick(() => { lucide.createIcons(); });
          setTimeout(() => {
            this.toasts = this.toasts.filter(t => t.id !== id);
          }, 3000);
        },

        startNewPrompt() {
          this.currentStep = 1;
          this.activeTab = 'builder';
        },

        prevStep() {
          if (this.currentStep > 1) this.currentStep--;
        },

        nextStep() {
          if (this.currentStep < 20) {
            this.currentStep++;
          } else {
            this.generatePromptMarkdown();
            this.activeTab = 'output';
          }
        },

        saveToLocalStorage() {
          localStorage.setItem('app_prompts', JSON.stringify(this.savedPrompts));
        },

        saveSettings() {
          localStorage.setItem('app_settings', JSON.stringify(this.settings));
          this.addToast('Konfigurasi default berhasil disimpan!');
        },

        toggleFav(id) {
          const prompt = this.savedPrompts.find(p => p.id === id);
          if (prompt) {
            prompt.fav = !prompt.fav;
            this.saveToLocalStorage();
            this.addToast(prompt.fav ? 'Ditambahkan ke favorit' : 'Dihapus dari favorit');
          }
        },

        deletePrompt(id) {
          this.savedPrompts = this.savedPrompts.filter(p => p.id !== id);
          this.saveToLocalStorage();
          this.addToast('Prompt berhasil dihapus', 'error');
        },

        loadSavedPrompt(p) {
          this.form = JSON.parse(JSON.stringify(p.form));
          this.generatePromptMarkdown();
          this.activeTab = 'output';
          this.addToast('Berhasil memuat prompt tersimpan');
        },

        applyTemplate(tpl) {
          this.form.appName = tpl.name;
          this.form.platform = tpl.defaultPlatform;
          this.generatePromptMarkdown();
          this.activeTab = 'output';
          this.addToast('Template diaplikasikan!');
        },

        saveAsTemplate() {
          const newSaved = {
            id: Date.now(),
            appName: this.form.appName || 'Aplikasi Tanpa Nama',
            platform: this.form.platform,
            fav: false,
            form: JSON.parse(JSON.stringify(this.form))
          };
          this.savedPrompts.unshift(newSaved);
          this.saveToLocalStorage();
          this.addToast('Prompt disimpan ke Dashboard!');
        },

        copyToClipboard() {
          navigator.clipboard.writeText(this.generatedPrompt);
          this.addToast('Prompt disalin ke clipboard!');
        },

        downloadTXT() {
          const blob = new Blob([this.generatedPrompt], { type: 'text/plain;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${this.form.appName.toLowerCase().replace(/[^a-z0-9]/g, '_')}_prompt.txt`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          this.addToast('File TXT berhasil diunduh!');
        },

        generatePromptMarkdown() {
          const f = this.form;
          
          let p = `# SPESIFIKASI PROGRESIVE & PETUNJUK ARSITEKTUR KODE\n\n`;
          p += `Anda adalah seorang **${f.aiRoles.join(', ')}**. Target AI implementasi Anda adalah **${f.targetAI}**. Saya memerlukan Anda menghasilkan rancangan arsitektur sistem dan menulis kode boilerplate struktural yang memenuhi kriteria di bawah ini.\n\n`;
          
          p += `## INFORMASI UTAMA\n`;
          p += `- **Nama Aplikasi:** ${f.appName || 'Aplikasi Tanpa Nama'}\n`;
          p += `- **Jenis Aplikasi:** ${f.appType}\n`;
          p += `- **Teknologi Utama:** ${f.platform}\n`;
          p += `- **Sistem Database:** ${f.database}\n`;
          p += `- **Tingkat Kedetailan Penjelasan:** ${f.detailLevel.toUpperCase()}\n\n`;

          // Google Apps Script Specific Block
          if (f.platform === 'Google App Script') {
            p += `## PERSYARATAN KHUSUS GOOGLE APP SCRIPT\n`;
            p += `- **Aturan Struktur File:** ${f.gas.structure}\n`;
            p += `- **Pilihan Spreadsheet Otomatis:** ${f.gas.sheetsOptions.join(', ') || 'Manual'}\n`;
            p += `- **Model Hosting Frontend:** ${f.gas.hostingFrontend}\n`;
            p += `- **Panduan Deployment:** ${f.gas.deployGuide ? 'Sertakan instruksi deploy lengkap' : 'Tidak perlu'}\n`;
            p += `- **Panduan Publishing:** ${f.gas.publishGuide ? 'Sertakan instruksi publish web-app lengkap' : 'Tidak perlu'}\n\n`;
          }

          p += `## SISTEM OTENTIKASI & MANAJEMEN AKSES\n`;
          p += `- **Metode Keamanan Login:** ${f.authMethod}\n`;
          p += `- **Roles Pengguna:** ${f.roles.join(', ') || 'Tanpa multi-role'}\n\n`;

          p += `## MODUL DASHBOARD INTERNAL\n`;
          p += `Tampilan dashboard wajib menyediakan widget sebagai berikut:\n`;
          f.dashboardItems.forEach(item => { p += `- [x] Widget ${item}\n`; });
          p += `\n`;

          p += `## OPERASI CRUD DATA\n`;
          p += `Fitur pengelolaan manipulasi data (CRUD) harus menyertakan kemampuan:\n`;
          f.crud.forEach(c => { p += `- [x] Kemampuan ${c}\n`; });
          p += `\n`;

          p += `## PENCARIAN & QUERY DATA\n`;
          f.search.forEach(s => { p += `- [x] Fitur ${s}\n`; });
          p += `\n`;

          p += `## SPESIFIKASI UI & TEMA\n`;
          p += `- **Framework CSS:** ${f.uiFramework}\n`;
          p += `- **Skema Warna:** ${f.uiThemes.join(', ')}\n`;
          p += `- **Fitur Dukungan Mobile:** ${f.mobile.join(', ')}\n\n`;

          p += `## PERSYARATAN SEO & AI READINESS\n`;
          f.seo.forEach(s => { p += `- [x] Optimasi ${s}\n`; });
          p += `\n`;

          p += `## PROTOKOL KEAMANAN\n`;
          f.security.forEach(s => { p += `- [x] Proteksi ${s}\n`; });
          p += `\n`;

          p += `## OPTIMASI PERFORMA\n`;
          f.performance.forEach(s => { p += `- [x] Implementasi ${s}\n`; });
          p += `\n`;

          p += `## KOMPONEN UI UTAMA\n`;
          f.components.forEach(s => { p += `- [x] Komponen ${s}\n`; });
          p += `\n`;

          p += `## FORMAT UNGGAHAN BERKAS (FILE UPLOADS)\n`;
          p += `- **Mendukung format file:** ${f.uploads.join(', ') || 'Tanpa fitur unggahan'}\n\n`;

          p += `## EKSTERNAL INTEGRASI & LAYANAN API\n`;
          p += `- **Koneksi Integrasi:** ${f.integrations.join(', ') || 'Tanpa integrasi eksternal'}\n\n`;

          p += `## PERSYARATAN DOKUMENTASI & STRUKTUR FILE\n`;
          p += `Wajib menyertakan penjelasan dokumentasi:\n`;
          f.docs.forEach(s => { p += `- [x] Format ${s}\n`; });
          p += `\n`;

          p += `## INSTRUKSI EKSEKUSI UNTUK AI\n`;
          p += `Berikan boilerplate kode yang bersih, terdokumentasi dengan baik menggunakan standardisasi penamaan file, penanganan pengecualian (exception handling), dan pastikan seluruh kode bersifat modular agar siap dikembangkan lebih lanjut.`;

          this.generatedPrompt = p;
        }
      }
    }
  </script>
</body>
</html>

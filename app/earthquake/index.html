<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>QuakeWatch • Earthquake Alert</title>
  <!-- Font Awesome 6 for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      background: #0b0f1c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 12px;
    }

    /* mobile-first card container */
    .app-container {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(145deg, #101524 0%, #0c0f1c 100%);
      border-radius: 40px;
      padding: 20px 16px 24px;
      box-shadow: 0 25px 50px -8px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.08);
      border: 1px solid rgba(74, 144, 226, 0.18);
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      backdrop-filter: blur(10px);
    }

    /* status bar mock */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #9aa4bf;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      padding: 0 4px;
    }

    /* header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pulse-icon {
      background: #e53e3e;
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: white;
      box-shadow: 0 8px 18px rgba(229,62,62,0.5);
      animation: softPulse 2s infinite;
    }

    @keyframes softPulse {
      0% { box-shadow: 0 0 0 0 rgba(229,62,62,0.7); }
      70% { box-shadow: 0 0 0 12px rgba(229,62,62,0); }
      100% { box-shadow: 0 0 0 0 rgba(229,62,62,0); }
    }

    .app-title {
      color: #f1f5f9;
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }
    .app-sub {
      color: #94a3b8;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .alert-badge {
      background: rgba(255,255,255,0.06);
      padding: 6px 14px;
      border-radius: 20px;
      color: #cbd5e1;
      font-weight: 600;
      font-size: 0.8rem;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* alert severity card – main display */
    .alert-card {
      background: rgba(20, 25, 40, 0.8);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 20px 18px;
      border: 1px solid rgba(255, 100, 100, 0.3);
      box-shadow: 0 20px 30px -12px rgba(229, 62, 62, 0.3);
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: linear-gradient(135deg, rgba(180, 40, 40, 0.2) 0%, rgba(16, 20, 35, 0.9) 80%);
    }

    .magnitude-ring {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin: 5px 0;
    }

    .mag-circle {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ff4d4d, #b91c1c);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(255,70,70,0.6);
      border: 3px solid rgba(255,200,200,0.5);
      color: white;
    }

    .mag-value {
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1;
      text-shadow: 0 2px 10px black;
    }

    .mag-label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .location-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #f8fafc;
      font-weight: 600;
      font-size: 1.2rem;
      background: rgba(0,0,0,0.4);
      padding: 8px 15px;
      border-radius: 30px;
      margin: 0 auto;
      width: fit-content;
      backdrop-filter: blur(10px);
    }

    .details-grid {
      display: flex;
      justify-content: space-between;
      color: #cbd5e1;
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.05);
      padding: 6px 12px;
      border-radius: 20px;
    }

    /* safety instructions */
    .safety-panel {
      background: #1e293b;
      border-radius: 24px;
      padding: 16px;
      border-left: 4px solid #fbbf24;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: linear-gradient(90deg, #1e293b 0%, #0f172a 100%);
    }

    .safety-title {
      color: #fbbf24;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .instruction-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      color: #e2e8f0;
      font-size: 0.9rem;
    }

    .instruction-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .instruction-item i {
      color: #fbbf24;
      margin-top: 2px;
    }

    /* quick actions */
    .actions-row {
      display: flex;
      gap: 12px;
      margin-top: 4px;
    }

    .btn {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 40px;
      padding: 14px 10px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      backdrop-filter: blur(10px);
      transition: all 0.2s ease;
      cursor: pointer;
      background: #1e293b;
    }

    .btn-primary {
      background: #dc2626;
      border: 1px solid #f87171;
      color: white;
      box-shadow: 0 8px 18px rgba(220,38,38,0.4);
      font-weight: 700;
    }

    .btn-primary i {
      color: white;
    }

    .btn:active {
      transform: scale(0.96);
      background: #334155;
    }

    .btn-primary:active {
      background: #b91c1c;
    }

    /* recent tremors list */
    .recent-header {
      display: flex;
      justify-content: space-between;
      color: #94a3b8;
      font-weight: 600;
      font-size: 0.9rem;
      margin-top: 5px;
    }

    .quake-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 150px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .quake-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.04);
      border-radius: 18px;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .mini-mag {
      background: #4b5563;
      color: white;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 0.8rem;
      background: #b45309;
    }

    .quake-location {
      color: #e2e8f0;
      font-weight: 500;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .time-ago {
      color: #64748b;
      font-size: 0.7rem;
    }

    /* responsive tweaks */
    @media (max-width: 380px) {
      .mag-circle {
        width: 90px;
        height: 90px;
      }
      .mag-value {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- top status mock -->
    <div class="status-bar">
      <span>9:41</span>
      <span><i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-full"></i></span>
    </div>

    <!-- header -->
    <div class="header">
      <div class="logo-area">
        <div class="pulse-icon">
          <i class="fas fa-house-damage"></i>
        </div>
        <div>
          <div class="app-title">QuakeWatch</div>
          <div class="app-sub">live alert system</div>
        </div>
      </div>
      <div class="alert-badge">
        <i class="fas fa-bell fa-shake" style="color:#fbbf24;"></i> ACTIVE
      </div>
    </div>

    <!-- dynamic earthquake alert card -->
    <div class="alert-card" id="alertCard">
      <div class="magnitude-ring">
        <div class="mag-circle">
          <span class="mag-value" id="magDisplay">6.4</span>
          <span class="mag-label">MAGNITUDE</span>
        </div>
      </div>
      <div class="location-row">
        <i class="fas fa-map-marker-alt" style="color:#f87171;"></i>
        <span id="locationDisplay">Central California</span>
      </div>
      <div class="details-grid">
        <div class="detail-item"><i class="far fa-clock"></i> <span id="timeDisplay">14:22 UTC</span></div>
        <div class="detail-item"><i class="fas fa-arrow-down"></i> <span id="depthDisplay">12 km</span></div>
        <div class="detail-item"><i class="fas fa-exclamation-triangle" style="color:#fbbf24;"></i> <span id="alertLevel">Severe</span></div>
      </div>
    </div>

    <!-- safety instructions based on scenario -->
    <div class="safety-panel" id="safetyPanel">
      <div class="safety-title">
        <i class="fas fa-shield-alt"></i> DROP, COVER, HOLD ON
      </div>
      <div class="instruction-list" id="instructionList">
        <!-- dynamically filled -->
      </div>
    </div>

    <!-- action buttons -->
    <div class="actions-row">
      <button class="btn" id="safeBtn"><i class="fas fa-check-circle"></i> I'm Safe</button>
      <button class="btn btn-primary" id="sosBtn"><i class="fas fa-exclamation-triangle"></i> SOS</button>
    </div>

    <!-- recent seismic activity -->
    <div class="recent-header">
      <span><i class="fas fa-list-ul"></i> Recent nearby</span>
      <span style="color:#fbbf24; font-size:0.75rem;">updated live</span>
    </div>
    <div class="quake-list" id="quakeList">
      <!-- injected via js -->
    </div>
  </div>

  <script>
    (function() {
      // ----- Earthquake data simulation (responsive dynamic content) -----
      const quakeScenarios = [
        {
          magnitude: 6.4,
          location: "Central California",
          depth: 12.3,
          time: "14:22 UTC",
          alert: "Severe",
          instructions: [
            "Drop to your hands and knees.",
            "Cover your head and neck under sturdy table.",
            "Hold on until shaking stops.",
            "Stay away from windows and exteriors."
          ]
        },
        {
          magnitude: 5.1,
          location: "Tokyo Region, Japan",
          depth: 35.0,
          time: "08:15 UTC",
          alert: "Strong",
          instructions: [
            "Stay calm and protect your head.",
            "If indoors, stay inside. Avoid elevators.",
            "Be aware of falling objects.",
            "Expect aftershocks."
          ]
        },
        {
          magnitude: 7.2,
          location: "Lima, Peru",
          depth: 28.7,
          time: "22:47 UTC",
          alert: "Extreme",
          instructions: [
            "DROP, COVER, and HOLD ON immediately.",
            "If near coast, move to high ground (tsunami risk).",
            "Do not use matches or lighters.",
            "Check for injuries once shaking stops."
          ]
        }
      ];

      // Additional recent quakes list
      const recentQuakes = [
        { mag: 4.3, location: "Alaska Peninsula", time: "12 min ago" },
        { mag: 3.8, location: "Southern Italy", time: "28 min ago" },
        { mag: 5.6, location: "Kermadec Islands", time: "42 min ago" },
        { mag: 2.9, location: "Northern California", time: "1h ago" }
      ];

      // DOM elements
      const magDisplay = document.getElementById('magDisplay');
      const locationDisplay = document.getElementById('locationDisplay');
      const timeDisplay = document.getElementById('timeDisplay');
      const depthDisplay = document.getElementById('depthDisplay');
      const alertLevelSpan = document.getElementById('alertLevel');
      const instructionList = document.getElementById('instructionList');
      const quakeList = document.getElementById('quakeList');
      const safeBtn = document.getElementById('safeBtn');
      const sosBtn = document.getElementById('sosBtn');

      // Current active scenario index
      let currentScenarioIndex = 0;

      // Function to update UI based on scenario
      function updateEarthquakeData(scenario) {
        // Update main alert card
        magDisplay.textContent = scenario.magnitude.toFixed(1);
        locationDisplay.textContent = scenario.location;
        timeDisplay.textContent = scenario.time;
        depthDisplay.textContent = scenario.depth.toFixed(1) + ' km';
        alertLevelSpan.textContent = scenario.alert;

        // Change alert card border/style based on severity
        const alertCard = document.getElementById('alertCard');
        if (scenario.alert === 'Extreme' || scenario.magnitude >= 7.0) {
          alertCard.style.border = '1px solid rgba(255, 80, 80, 0.8)';
          alertCard.style.background = 'linear-gradient(135deg, rgba(200, 20, 20, 0.4) 0%, rgba(16, 20, 35, 0.9) 80%)';
        } else if (scenario.alert === 'Severe' || scenario.magnitude >= 6.0) {
          alertCard.style.border = '1px solid rgba(255, 140, 0, 0.6)';
          alertCard.style.background = 'linear-gradient(135deg, rgba(180, 80, 20, 0.3) 0%, rgba(16, 20, 35, 0.9) 80%)';
        } else {
          alertCard.style.border = '1px solid rgba(255, 200, 100, 0.4)';
          alertCard.style.background = 'linear-gradient(135deg, rgba(180, 120, 30, 0.25) 0%, rgba(16, 20, 35, 0.9) 80%)';
        }

        // Update safety instructions
        instructionList.innerHTML = '';
        scenario.instructions.forEach(instruction => {
          const item = document.createElement('div');
          item.className = 'instruction-item';
          item.innerHTML = `<i class="fas fa-circle" style="font-size: 0.4rem; align-self: center;"></i><span>${instruction}</span>`;
          instructionList.appendChild(item);
        });
      }

      // Populate recent quakes list
      function renderRecentQuakes() {
        quakeList.innerHTML = '';
        recentQuakes.forEach(q => {
          const quakeDiv = document.createElement('div');
          quakeDiv.className = 'quake-item';
          quakeDiv.innerHTML = `
            <div class="quake-location"><i class="fas fa-globe-americas" style="color:#94a3b8;"></i> ${q.location}</div>
            <div style="display:flex; align-items:center; gap:8px;">
              <span class="mini-mag">M${q.mag.toFixed(1)}</span>
              <span class="time-ago">${q.time}</span>
            </div>
          `;
          quakeList.appendChild(quakeDiv);
        });
      }

      // Simulate refresh / scenario change (responsive interaction)
      function loadRandomScenario() {
        const randomIndex = Math.floor(Math.random() * quakeScenarios.length);
        currentScenarioIndex = randomIndex;
        updateEarthquakeData(quakeScenarios[randomIndex]);
      }

      // Manual refresh: tapping on alert card or using cyclic demonstration
      function nextScenario() {
        currentScenarioIndex = (currentScenarioIndex + 1) % quakeScenarios.length;
        updateEarthquakeData(quakeScenarios[currentScenarioIndex]);
      }

      // Event Listeners for buttons
      safeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        // Visual feedback for "I'm Safe"
        safeBtn.style.background = '#15803d';
        safeBtn.innerHTML = '<i class="fas fa-check-circle"></i> Marked Safe';
        setTimeout(() => {
          safeBtn.style.background = '#1e293b';
          safeBtn.innerHTML = '<i class="fas fa-check-circle"></i> I\'m Safe';
        }, 2000);
        // Could trigger notification simulation
        alert('✅ You are marked safe. Emergency contacts notified.');
      });

      sosBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        sosBtn.style.background = '#7f1d1d';
        sosBtn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Sending...';
        setTimeout(() => {
          sosBtn.style.background = '#dc2626';
          sosBtn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> SOS';
        }, 2500);
        alert('🆘 Emergency SOS activated! Sharing location with authorities.');
      });

      // Tap on alert card to simulate refresh / next scenario (for demo)
      document.getElementById('alertCard').addEventListener('click', () => {
        nextScenario();
        // subtle haptic-like feedback (visual pulse)
        const card = document.getElementById('alertCard');
        card.style.transform = 'scale(0.98)';
        setTimeout(() => { card.style.transform = 'scale(1)'; }, 120);
      });

      // Also allow automatic demo rotation every 25 seconds (simulate live updates)
      setInterval(() => {
        // rotate scenario to show live feeling
        nextScenario();
      }, 28000); // changes every 28 seconds

      // Initialize with first scenario and recent list
      updateEarthquakeData(quakeScenarios[0]);
      renderRecentQuakes();

      // Optional: simulate time update for realism (just update displayed time occasionally)
      // But we keep static demo time from scenario. 
      // Additional responsive: update recent quakes time dynamically could be added.

      // For demonstration, update recent quakes relative times dynamically
      setInterval(() => {
        // Update time ago strings (simple refresh)
        const timeElements = document.querySelectorAll('.time-ago');
        if (timeElements.length) {
          // just keep as is or shuffle slightly; we keep static for clarity.
        }
      }, 60000);

      // Provide manual "refresh" via header badge click
      document.querySelector('.alert-badge').addEventListener('click', (e) => {
        e.stopPropagation();
        loadRandomScenario();
        // Visual cue
        const badge = document.querySelector('.alert-badge');
        badge.style.background = 'rgba(251,191,36,0.2)';
        setTimeout(() => { badge.style.background = 'rgba(255,255,255,0.06)'; }, 300);
      });

      // Responsive touch: long press on magnitude to reset to severe
      document.querySelector('.mag-circle').addEventListener('click', (e) => {
        e.stopPropagation();
        // set to first scenario (severe demo)
        updateEarthquakeData(quakeScenarios[0]);
        currentScenarioIndex = 0;
      });

    })();
  </script>
</body>
</html>

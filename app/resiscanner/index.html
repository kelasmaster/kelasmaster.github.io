<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan to DB App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    body { background-color: #f8f9fa; font-family: sans-serif; }
    #reader { width: 100%; max-width: 500px; margin: auto; background: white; border-radius: 8px; overflow: hidden; }
    .card-dashboard { border-left: 5px solid #0d6efd; }
  </style>
</head>
<body>

  <div class="container py-4">
    <h2 class="text-center mb-4 fw-bold text-primary">Scan to DB App (Hosted)</h2>
    
    <div class="row g-4">
      <div class="col-md-6 text-center">
        <div class="card shadow-sm p-3 mb-3 bg-white rounded">
          <h5 class="card-title mb-3">Arahkan Kamera ke Barcode Resi</h5>
          <div id="reader"></div>
          <div id="result-scan" class="mt-3 fw-bold"></div>
        </div>
      </div>
      
      <div class="col-md-6">
        <div class="card card-dashboard shadow-sm p-3 mb-3 bg-white rounded">
          <div class="row align-items-center">
            <div class="col">
              <h6 class="text-muted text-uppercase fs-7">Total Resi Ter-scan</h6>
              <h2 class="fw-bold text-dark" id="total-scan">0</h2>
            </div>
          </div>
        </div>
        
        <div class="card shadow-sm p-3 bg-white rounded">
          <h5 class="card-title mb-3">5 Resi Terakhir</h5>
          <div class="table-responsive">
            <table class="table table-striped align-middle">
              <thead>
                <tr>
                  <th>Waktu</th>
                  <th>Nomor Resi</th>
                </tr>
              </thead>
              <tbody id="tabel-resi">
                <tr>
                  <td colspan="2" class="text-center text-muted">Memuat data...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyMRZPXpgf4vKuX2Q12n39LkfKV23WA9APIHPKoVSRdUx-zEi2LHdfp9PJ4iMlQMnc6/exec";

    document.addEventListener("DOMContentLoaded", function() {
      muatDashboard();
      mulaiScanner();
    });

    function mulaiScanner() {
      const html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", { fps: 10, qrbox: { width: 250, height: 150 } }
      );
      html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    function onScanSuccess(decodedText, decodedResult) {
      const resultDiv = document.getElementById('result-scan');
      resultDiv.innerHTML = `<span class="text-warning">Memproses resi: ${decodedText}...</span>`;
      
      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ action: "simpanResi", nomorResi: decodedText })
      })
      .then(res => res.json())
      .then(response => {
        if(response.status === 'success') {
          resultDiv.innerHTML = `<span class="text-success">${response.message}</span>`;
          muatDashboard();
        } else {
          resultDiv.innerHTML = `<span class="text-danger">${response.message}</span>`;
        }
      })
      .catch(err => {
        resultDiv.innerHTML = `<span class="text-danger">Gagal terhubung ke server!</span>`;
      });
    }

    function onScanFailure(error) {}

    function muatDashboard() {
      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ action: "ambilDashboard" })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('total-scan').innerText = data.total;
        let tbody = document.getElementById('tabel-resi');
        tbody.innerHTML = '';
        
        if (!data.terakhir || data.terakhir.length === 0) {
          tbody.innerHTML = '<tr><td colspan="2" class="text-center text-muted">Belum ada data resi.</td></tr>';
          return;
        }
        
        data.terakhir.forEach(item => {
          let row = `<tr>
            <td><small class="text-muted">${item.waktu}</small></td>
            <td class="fw-bold">${item.resi}</td>
          </tr>`;
          tbody.innerHTML += row;
        });
      });
    }
  </script>
</body>
</html>
